name: mineru-next-dev-release

on:
  schedule:
    - cron: "20 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-next-dev:
    if: github.repository == 'johnking0099/MinerU-Repo'
    runs-on: ubuntu-latest
    env:
      PACKAGE_NAME: mineru-next-dev
      BASE_VERSION: 4.0.0
      SOURCE_BRANCH: next
      STATE_BRANCH: release-state
      STATE_FILE: .github/release-state/mineru-next-dev.json
    steps:
      - name: Checkout next
        uses: actions/checkout@v6
        with:
          ref: next
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Resolve release metadata
        id: release_meta
        run: |
          echo "current_commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "version=$(python .github/scripts/next_dev_release.py version --base-version "$BASE_VERSION")" >> "$GITHUB_OUTPUT"

      - name: Prepare release-state worktree
        id: release_state
        run: |
          state_dir="$RUNNER_TEMP/release-state"
          git fetch origin "$STATE_BRANCH" || true

          if git show-ref --verify --quiet "refs/remotes/origin/$STATE_BRANCH"; then
            git worktree add --force "$state_dir" "refs/remotes/origin/$STATE_BRANCH"
          else
            git worktree add --detach "$state_dir" HEAD
            git -C "$state_dir" checkout --orphan "$STATE_BRANCH"
            git -C "$state_dir" rm -rf --ignore-unmatch . >/dev/null 2>&1 || true
            git -C "$state_dir" clean -fdx >/dev/null 2>&1 || true
          fi

          previous_commit="$(python .github/scripts/next_dev_release.py state-commit --state-file "$state_dir/$STATE_FILE")"
          should_publish=true
          if [ -n "$previous_commit" ] && [ "$previous_commit" = "${{ steps.release_meta.outputs.current_commit }}" ]; then
            should_publish=false
          fi

          echo "state_dir=$state_dir" >> "$GITHUB_OUTPUT"
          echo "previous_commit=$previous_commit" >> "$GITHUB_OUTPUT"
          echo "should_publish=$should_publish" >> "$GITHUB_OUTPUT"

      - name: Stop when next has no changes since last publish
        if: steps.release_state.outputs.should_publish != 'true'
        run: |
          echo "Skip publish because $SOURCE_BRANCH commit ${GITHUB_SHA} matches the last successful release state."

      - name: Install build tooling
        if: steps.release_state.outputs.should_publish == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Patch package metadata for next-dev release
        if: steps.release_state.outputs.should_publish == 'true'
        run: |
          python .github/scripts/next_dev_release.py patch-workspace \
            --pyproject pyproject.toml \
            --version-file mineru/version.py \
            --package-name "$PACKAGE_NAME" \
            --version "${{ steps.release_meta.outputs.version }}"

      - name: Build distribution
        if: steps.release_state.outputs.should_publish == 'true'
        run: |
          python -m build --wheel
          python -m twine check dist/*

      - name: Publish to PyPI
        if: steps.release_state.outputs.should_publish == 'true'
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          python -m twine upload dist/* -u __token__ -p "$PYPI_TOKEN"

      - name: Update release-state branch
        if: steps.release_state.outputs.should_publish == 'true'
        run: |
          state_dir="${{ steps.release_state.outputs.state_dir }}"
          python .github/scripts/next_dev_release.py write-state \
            --state-file "$state_dir/$STATE_FILE" \
            --package "$PACKAGE_NAME" \
            --version "${{ steps.release_meta.outputs.version }}" \
            --source-branch "$SOURCE_BRANCH" \
            --source-commit "${{ steps.release_meta.outputs.current_commit }}"

          git -C "$state_dir" config user.name "github-actions[bot]"
          git -C "$state_dir" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$state_dir" add "$STATE_FILE"

          if git -C "$state_dir" diff --cached --quiet; then
            echo "No release-state changes to commit."
          else
            git -C "$state_dir" commit -m "Update mineru-next-dev release state for ${{ steps.release_meta.outputs.version }}"
            git -C "$state_dir" push origin HEAD:"$STATE_BRANCH"
          fi

      - name: Remove release-state worktree
        if: always() && steps.release_state.outputs.state_dir != ''
        run: |
          git worktree remove --force "${{ steps.release_state.outputs.state_dir }}" || true
