name: lint

on:
  push:
    branches:
      - "master"
      - "dev"
    paths-ignore:
      - "cmds/**"
      - "**.md"
  pull_request:
    branches:
      - "master"
      - "dev"
    paths-ignore:
      - "cmds/**"
      - "**.md"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff black mypy bandit[toml]

      - name: Run ruff
        run: ruff check mineru/ --output-format=github
        continue-on-error: true

      - name: Run black check
        run: black --check mineru/
        continue-on-error: true

      - name: Run mypy
        run: mypy --ignore-missing-imports --no-namespace-packages mineru/
        continue-on-error: true

      - name: Run bandit
        run: bandit -r mineru/ -f json -o bandit.json || true
